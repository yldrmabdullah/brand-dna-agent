# Arket — H&M Group, considered Scandinavian essentials.
# Mainstream e-commerce, schema.org-clean, less aggressive anti-bot than COS.
# Acts as our second sample alongside Les Benjamins.

name: Arket
url: https://www.arket.com
social:
  instagram: arketofficial
  pinterest: arketofficial

known_categories:
  - Outerwear
  - Knitwear
  - Tailoring
  - Denim

seed_pages:
  - https://www.arket.com/en/women/view-all.html
  - https://www.arket.com/en/men/view-all.html
  - https://www.arket.com/en/about
  - https://www.arket.com/en/sustainability

notes: |
  Arket emphasizes considered design, longevity, and material transparency.
  /about and /sustainability are the strongest sources for brand voice.

crawl:
  max_pages: 200
  max_images: 400
  max_concurrency: 4
  delay_ms: 500
  render_js: false
  page_type_hints:
    product:
      - /product/
    collection:
      - /view-all
      - /women/
      - /men/
    lookbook:
      - /editorial
    about:
      - /about
      - /sustainability

filter:
  min_shorter_side: 512
  fashion_score_threshold: 0.55
  phash_hamming_threshold: 5
  target_image_count: 100

analysis:
  palette_k: 8
  n_aesthetic_clusters_min: 3
  n_aesthetic_clusters_max: 5
